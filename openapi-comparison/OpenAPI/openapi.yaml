openapi: 3.0.3
info:
  title: Library Management API
  version: 1.0.0
  description: Simple API for managing books in a library

servers:
  - url: http://localhost:5000

paths:
  /books:
    get:
      summary: Get all books
      responses:
        '200':
          description: Book list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'

    post:
      summary: Create a new book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '201':
          description: Book created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'

  /books/{bookId}:
    get:
      summary: Get a book by ID
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Book detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Book not found

    put:
      summary: Update a book
      parameters:
        - $ref: '#/components/parameters/BookId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '200':
          description: Book updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Book not found

    delete:
      summary: Delete a book
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Book deleted
        '404':
          description: Book not found

components:
  parameters:
    BookId:
      name: bookId
      in: path
      required: true
      schema:
        type: integer
        example: 1

  schemas:
    Book:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Clean Code
        author:
          type: string
          example: Robert C. Martin
        published_year:
          type: integer
          example: 2008

    BookInput:
      type: object
      required:
        - title
        - author
      properties:
        title:
          type: string
        author:
          type: string
        published_year:
          type: integer